# Sample runtime configuration. Values here are informational — the source of
# truth for the running app is .env (see .env.example). This file documents
# expected structure for operators.
#
# Scope: Nifty 50 only. We cover the Nifty 50 index, Nifty index futures,
# Nifty index options, and the 50 Nifty constituent equities. Bank Nifty,
# MCX commodities, BSE-only names and anything outside Nifty 50 are
# intentionally out of scope.

app:
  mode: analysis         # analysis | paper | live
  account_capital: 100000
  risk_per_trade_pct: 0.75
  max_daily_loss_pct: 2.0
  max_open_positions: 5
  max_trades_per_day: 10
  cooldown_after_losses: 2

market:
  timezone: Asia/Kolkata
  open: "09:15"
  close: "15:30"
  square_off: "15:20"

watchlist:
  # Kept narrow on purpose: Nifty index + all 50 constituents. Derivatives
  # (Nifty futures + Nifty options) are resolved at runtime from the
  # Zerodha instrument master (see `derivatives.auto_load_current_expiry`).
  indices:
    - NSE:NIFTY 50
  equity:
    - NSE:RELIANCE
    - NSE:HDFCBANK
    - NSE:ICICIBANK
    - NSE:INFY
    - NSE:TCS
    - NSE:BHARTIARTL
    - NSE:ITC
    - NSE:LT
    - NSE:AXISBANK
    - NSE:KOTAKBANK
    - NSE:SBIN
    - NSE:HINDUNILVR
    - NSE:BAJFINANCE
    - NSE:MARUTI
    - NSE:ASIANPAINT
    - NSE:HCLTECH
    - NSE:M&M
    - NSE:SUNPHARMA
    - NSE:TITAN
    - NSE:ULTRACEMCO
    - NSE:NTPC
    - NSE:POWERGRID
    - NSE:NESTLEIND
    - NSE:WIPRO
    - NSE:ADANIENT
    - NSE:ADANIPORTS
    - NSE:TATAMOTORS
    - NSE:ONGC
    - NSE:JSWSTEEL
    - NSE:BAJAJFINSV
    - NSE:COALINDIA
    - NSE:GRASIM
    - NSE:TATASTEEL
    - NSE:HINDALCO
    - NSE:INDUSINDBK
    - NSE:TECHM
    - NSE:CIPLA
    - NSE:DRREDDY
    - NSE:APOLLOHOSP
    - NSE:BRITANNIA
    - NSE:DIVISLAB
    - NSE:EICHERMOT
    - NSE:HEROMOTOCO
    - NSE:BAJAJ-AUTO
    - NSE:BPCL
    - NSE:SHRIRAMFIN
    - NSE:TATACONSUM
    - NSE:SBILIFE
    - NSE:HDFCLIFE
    - NSE:LTIM
  derivatives:
    # Populated at runtime from instrument master. We only load the current
    # weekly NIFTY index expiry (futures + ATM-centred options strikes).
    auto_load_current_expiry: true
    underlying: "NIFTY"

timeframes: ["1m", "3m", "5m", "15m", "1h"]

exposure_caps:
  options_buying_max_capital_pct: 15
  futures_max_capital_pct: 50
  equity_intraday_max_capital_pct: 60
