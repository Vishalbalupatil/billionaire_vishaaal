# Strategy parameter overrides. Each entry maps a strategy `name` to params
# that override defaults at registration time. Scope: Nifty 50 only.

strategies:
  nifty_momentum_breakout:
    enabled: true
    timeframes: ["5m", "15m"]
    params:
      lookback: 20

  equity_intraday_breakout:
    enabled: true
    timeframes: ["5m"]
    params:
      opening_range_bars: 3

  options_premium_momentum:
    enabled: true
    timeframes: ["3m", "5m"]
    params: {}
