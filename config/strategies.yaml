# Strategy parameter overrides. Each entry maps a strategy `name` to params
# that override defaults at registration time.

strategies:
  nifty_momentum_breakout:
    enabled: true
    timeframes: ["5m", "15m"]
    params:
      lookback: 20

  banknifty_reversal_scalp:
    enabled: true
    timeframes: ["1m", "3m"]
    params: {}

  equity_intraday_breakout:
    enabled: true
    timeframes: ["5m"]
    params:
      opening_range_bars: 3

  options_premium_momentum:
    enabled: true
    timeframes: ["3m", "5m"]
    params: {}

  futures_trend_follow:
    enabled: true
    timeframes: ["15m", "1h"]
    params: {}
